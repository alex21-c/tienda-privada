<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | TIENDA PRIVADA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            padding: 24px;
            color: #00ff88;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 136, 0.03),
                    rgba(0, 255, 136, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            pointer-events: none;
            z-index: 1;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines { 0% { transform: translateY(0); } 100% { transform: translateY(10px); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px #00ff88; } 50% { text-shadow: 0 0 30px #00ff88, 0 0 50px #00ff44; } }
        @keyframes pulse-neon { 0%, 100% { box-shadow: 0 0 5px #00ff88; } 50% { box-shadow: 0 0 25px #00ff88, inset 0 0 15px rgba(0, 255, 136, 0.3); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes glitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } }
        
        /* Login */
        .login-box {
            max-width: 400px;
            margin: 15vh auto;
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.9), rgba(22, 33, 62, 0.9));
            border: 2px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5), inset 0 0 20px rgba(0, 255, 136, 0.1);
            position: relative;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
        }
        
        .login-box h2 { 
            color: #00ff88; 
            margin-bottom: 24px; 
            font-size: 1.8rem; 
            text-shadow: 0 0 15px #00ff88;
            animation: glow 2s ease-in-out infinite;
            letter-spacing: 3px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: rgba(15, 52, 96, 0.7);
            border: 1px solid #00ff88;
            border-radius: 5px;
            font-size: 1rem;
            color: #00ff88;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .login-box input:focus { 
            outline: none; 
            border-color: #00ffff; 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6), inset 0 0 10px rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, #00ff88 0%, #00ffbb 100%);
            color: #0a0e27;
            border: 2px solid #00ff88;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
            letter-spacing: 2px;
            font-size: 1rem;
        }

        .login-box button:hover { 
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8), 0 10px 30px rgba(0, 255, 136, 0.4);
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
        }

        .login-box button:active {
            transform: translateY(-1px);
        }
        
        /* Panel Admin */
        .admin-panel { max-width: 1400px; margin: 0 auto; display: none; position: relative; z-index: 10; }
        
        /* Header */
        .neo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.85), rgba(22, 33, 62, 0.85));
            border: 2px solid #00ff88;
            border-radius: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4), inset 0 0 15px rgba(0, 255, 136, 0.05);
        }

        .logo-area h1 { 
            font-size: 1.5rem; 
            font-weight: 800;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ff88;
            letter-spacing: 4px;
        }

        .badge { 
            background: linear-gradient(135deg, #00ff88, #00ffbb);
            color: #0a0e27;
            padding: 6px 18px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: 700;
            margin-left: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
            letter-spacing: 1px;
        }

        .store-link a { 
            color: #00ffff; 
            text-decoration: none; 
            font-size: 0.9rem; 
            border-bottom: 2px dashed #00ff88;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .store-link a:hover {
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.8), rgba(15, 52, 96, 0.8));
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 28px;
            border: 2px solid #00ff88;
            flex-wrap: wrap;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 15px rgba(0, 255, 136, 0.05);
        }

        .tab {
            padding: 12px 28px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #00ff88;
            border: 1px solid transparent;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
            letter-spacing: 1px;
        }

        .tab:hover {
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .tab.active {
            background: linear-gradient(135deg, #00ff88, #00ffbb);
            color: #0a0e27;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.7), inset 0 0 10px rgba(255, 255, 255, 0.2);
            border: 1px solid #00ff88;
            font-weight: 700;
            text-shadow: none;
        }
        
        /* Cards */
        .card {
            background: linear-gradient(135deg, rgba(15, 52, 96, 0.7), rgba(22, 33, 62, 0.7));
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 15px rgba(0, 255, 136, 0.05);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: 0 0 35px rgba(0, 255, 136, 0.5), inset 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .card-title {
            font-weight: 700;
            color: #00ffff;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        
        /* Formulario grid */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.6);
            border: 2px solid #00ff88;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            color: #00ff88;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        input::placeholder, select option, textarea::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #00ffff; 
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6), inset 0 0 12px rgba(0, 255, 255, 0.15);
        }
        
        /* Botones */
        .btn { 
            padding: 12px 24px; 
            border-radius: 5px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s; 
            border: 2px solid;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
        }

        .btn-primary { 
            background: linear-gradient(135deg, #00ff88, #00ffbb);
            border-color: #00ff88;
            color: #0a0e27;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .btn-primary:hover { 
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8), 0 8px 20px rgba(0, 255, 136, 0.4);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-outline { 
            background: transparent;
            border: 2px solid #00ff88; 
            color: #00ff88;
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.1);
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.4);
        }

        .btn-outline:hover { 
            background: rgba(0, 255, 136, 0.1);
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.15);
        }

        .btn-danger { 
            background: linear-gradient(135deg, #ff0055, #ff2288);
            border-color: #ff0055;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }

        .btn-danger:hover { 
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.8), 0 8px 20px rgba(255, 0, 85, 0.4);
            transform: translateY(-3px);
        }
        
        /* Tabla */
        .table-wrapper { 
            overflow-x: auto; 
            border-radius: 8px; 
            background: rgba(10, 14, 39, 0.6);
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 15px rgba(0, 255, 136, 0.05);
        }

        .data-table { width: 100%; border-collapse: collapse; min-width: 1200px; }

        .data-table th { 
            padding: 18px 14px; 
            text-align: left; 
            background: rgba(15, 52, 96, 0.8);
            color: #00ffff;
            font-weight: 700; 
            border-bottom: 2px solid #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        .data-table td { 
            padding: 14px; 
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            vertical-align: middle;
            color: #00ff88;
        }

        .data-table tr:hover { 
            background: rgba(0, 255, 136, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.15);
        }

        .id-link { 
            color: #00ffff; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: underline;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
        }

        .id-link:hover {
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            animation: glitch 0.3s;
        }
        
        /* Variantes */
        .color-chip { 
            background: rgba(15, 52, 96, 0.7);
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 16px; 
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            transition: all 0.3s;
        }

        .color-chip:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
            border-color: #00ffff;
        }

        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }

        .tallas-group { 
            margin-left: 28px; 
            padding: 14px; 
            background: rgba(10, 14, 39, 0.8);
            border-radius: 5px;
            border-left: 3px solid #00ff88;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s;
        }

        .modal-overlay.active { visibility: visible; opacity: 1; }

        .modal-container {
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95), rgba(22, 33, 62, 0.95));
            max-width: 700px; 
            width: 90%; 
            max-height: 85vh; 
            overflow-y: auto;
            border-radius: 8px; 
            padding: 35px; 
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.6), inset 0 0 30px rgba(0, 255, 136, 0.1);
        }
        
        /* Toast */
        .toast { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            background: linear-gradient(135deg, #00ff88, #00ffbb);
            color: #0a0e27;
            padding: 14px 28px; 
            border-radius: 5px; 
            z-index: 1100; 
            animation: slideInRight 0.4s ease-out;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.7);
            border: 2px solid #00ff88;
        }

        .toast.error {
            background: linear-gradient(135deg, #ff0055, #ff2288);
            color: #fff;
            border-color: #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.7);
        }

        @keyframes slideInRight { 
            from { opacity: 0; transform: translateX(100px); } 
            to { opacity: 1; transform: translateX(0); } 
        }
        
        .vacio { 
            text-align: center; 
            padding: 40px; 
            color: #00ff88;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        
        @media (max-width: 700px) { 
            .neo-header { flex-direction: column; text-align: center; } 
            .tabs { justify-content: center; } 
            .tab { padding: 10px 20px; font-size: 0.9rem; }
            .btn { padding: 10px 16px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginBox" class="login-box">
    <h2>⚡ NEXUS ADMIN ⚡</h2>
    <input type="password" id="adminPass" placeholder="INGRESA TU CLAVE..." autofocus>
    <button onclick="handleLogin()">» ACCESO AL SISTEMA</button>
</div>

<!-- Panel Admin -->
<div id="adminPanel" class="admin-panel">
    <div class="neo-header">
        <div class="logo-area"><h1>⚙️ TIENDA PRIVADA <span class="badge">v4.0 NEXUS</span></h1></div>
        <div class="store-link"><a href="https://alex21-c.github.io/tienda-privada/" target="_blank">» VER TIENDA</a></div>

    <div class="tabs">

        <button class="tab" data-tab="pedidos">📡 PEDIDOS</button>

    <div id="tabAgregar" class="tab-content">

                <input type="text" id="prodName" placeholder="NOMBRE DEL PRODUCTO">

                    <option value="Shein">Shein</option>

                    <option value="unisex">Unisex</option><option value="hombre">Hombre</option>
                    <option value="mujer">Mujer</option><option value="niño">Niño</option><option value="niña">Niña</option>

                <select id="prodCategory">

        <div class="card">
            <div class="card-title">🎨 VARIANTES (COLORES + TALLAS)</div>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="saveProduct()">💾 GUARDAR</button>
            <button class="btn btn-outline" onclick="generateProductJSON()">📄 GENERAR JSON</button>
            <button class="btn btn-outline" onclick="resetForm()">🔄 LIMPIAR</button>
        </div>
        <div id="jsonPreview" class="card" style="display: none; margin-top: 20px;">
            <div class="card-title">📋 JSON PARA SHEETS</div>
            <textarea id="jsonArea" rows="4" readonly></textarea>
            <button class="btn btn-outline" style="margin-top: 10px;" onclick="copyJSON()">COPIAR</button>
        </div>
    </div>
    
    <!-- Tab EDITAR -->
    <div id="tabEditar" class="tab-content" style="display: none;">
        <div class="card">
            <div class="card-title">
                <span>🔧 EDICIÓN RÁPIDA</span>
                <button class="btn btn-outline" onclick="cargarProductosEditor()" style="padding: 8px 16px; font-size: 0.8rem;">⟳ RECARGAR</button>

            <div id="editableTable" class="table-wrapper"></div>
        </div>
    </div>
    
    <!-- Tab PEDIDOS -->
    <div id="tabPedidos" class="tab-content" style="display: none;">
        <div class="card">
            <div class="card-title">📡 ÚLTIMOS PEDIDOS</div>
            <div id="ordersList"></div>
        </div>
    </div>
    
    <!-- Tab LISTAR -->
    <div id="tabListar" class="tab-content" style="display: none;">
        <div class="card">
            <div class="card-title">📊 INVENTARIO TOTAL</div>
            <div id="simpleProductList"></div>
        </div>
    </div>
</div>

<script>
// ==================== SISTEMA DE SONIDOS FUTURISTAS ====================
const sonidos = {
    click: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.05);
        
        filter.type = 'highpass';
        filter.frequency.setValueAtTime(3000, now);
        
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        
        osc.start(now);
        osc.stop(now + 0.05);
    },

    exito: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        
        const notas = [1200, 1600, 2000];
        notas.forEach((freq, i) => {
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.1);
            }, i * 50);
        });
    },

    error: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        
        osc.start(now);
        osc.stop(now + 0.15);
    },

    guardado: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'square';
                osc.frequency.value = 1000 + (i * 300);
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.08);
            }, i * 80);
        }
    },

    bienvenida: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notas = [523, 659, 784, 1047];
        notas.forEach((freq, i) => {
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.12);
            }, i * 80);
        });
    }
};

let audioContextInicializado = false;
function initAudio() {
    if (!audioContextInicializado) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume();
        audioContextInicializado = true;
    }
}

// ==================== VARIANTES ====================
function addColorVariant() { coloresAgregar.push({ id: Date.now(), nombre: '', imagen: '', precio: '', tallas: [] }); renderizarColoresAgregar(); }
function removeColorVariant(id) { coloresAgregar = coloresAgregar.filter(c => c.id !== id); renderizarColoresAgregar(); }
function updateColorField(id, field, val) { const c = coloresAgregar.find(c => c.id === id); if(c) c[field] = val; }
function addSizeToColor(id) { const c = coloresAgregar.find(c => c.id === id); if(c) c.tallas.push({ talla: '', precio: '' }); renderizarColoresAgregar(); }
function removeSize(colorId, idx) { const c = coloresAgregar.find(c => c.id === colorId); if(c) c.tallas.splice(idx,1); renderizarColoresAgregar(); }
function updateSize(colorId, idx, field, val) { const c = coloresAgregar.find(c => c.id === colorId); if(c && c.tallas[idx]) c.tallas[idx][field] = val; }

function renderizarColoresAgregar() {
    const container = document.getElementById('variantsContainer');
    if (!container) return;
    if (!coloresAgregar.length) { container.innerHTML = '<p style="color:#00ff88; text-shadow: 0 0 5px rgba(0,255,136,0.5);">» AGREGA COLORES CON TALLAS</p>'; return; }
    container.innerHTML = coloresAgregar.map(c => `
        <div class="color-chip">
            <div class="flex-row">
                <input type="text" placeholder="COLOR" value="${c.nombre}" style="flex:2" onchange="updateColorField(${c.id},'nombre',this.value)">
                <input type="text" placeholder="IMAGEN URL" value="${c.imagen}" style="flex:3" onchange="updateColorField(${c.id},'imagen',this.value)">
                <input type="number" placeholder="PRECIO" value="${c.precio}" step="0.01" style="flex:1" onchange="updateColorField(${c.id},'precio',parseFloat(this.value) || 0)">
                <button class="btn btn-danger" style="padding: 8px 12px;" onclick="removeColorVariant(${c.id})">🗑️</button>
            </div>
            <div class="tallas-group">
                <strong style="color: #00ffff; text-shadow: 0 0 5px rgba(0,255,255,0.5);">📏 TALLAS</strong>
                <div style="margin-top: 10px;">
                    ${c.tallas.map((t, idx) => `
                        <div class="flex-row" style="margin-bottom: 10px;">
                            <input type="text" placeholder="TALLA" value="${t.talla}" style="width:100px; margin-right: 8px;" onchange="updateSize(${c.id},${idx},'talla',this.value)">
                            <input type="number" placeholder="PRECIO" value="${t.precio}" step="0.01" style="width:140px; margin-right: 8px;" onchange="updateSize(${c.id},${idx},'precio',parseFloat(this.value) || 0)">
                            <button class="btn btn-danger" style="padding: 6px 12px;" onclick="removeSize(${c.id},${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-outline" onclick="addSizeToColor(${c.id})" style="margin-top: 10px;">+ TALLA</button>
            </div>
        </div>
    `).join('');
}

async function saveProduct() {
    initAudio();
    const nombre = document.getElementById('prodName').value;
    const precioBase = parseFloat(document.getElementById('prodPrice').value);
    if (!nombre || !precioBase) { sonidos.error(); toast('CAMPOS REQUERIDOS', true); return; }
    
    const coloresNombres = coloresAgregar.map(c => c.nombre).filter(n => n).join(',');
    const coloresImagenes = coloresAgregar.map(c => c.imagen).filter(i => i).join(',');
    const coloresPrecios = coloresAgregar.map(c => c.precio).filter(p => p).join(',');
    let variantesTexto = '';
    if (coloresAgregar.length) {
        variantesTexto = coloresAgregar.filter(c => c.tallas.length).map(c => `${c.nombre}:${c.tallas.map(t => `${t.talla}:${t.precio}`).join(',')}`).join('|');
    }
    
    const payload = {
        action: 'agregarProducto',
        nombre, precio: precioBase,
        origen: document.getElementById('prodPlatform').value,
        imagen: document.getElementById('prodImage').value || 'https://via.placeholder.com/300x200',
        enlace: document.getElementById('prodLink').value || '',
        categoria_genero: document.getElementById('prodGender').value,
        descripcion: document.getElementById('prodDesc').value || 'Producto de calidad',
        colores_nombres: coloresNombres, colores_imagenes: coloresImagenes, colores_precios: coloresPrecios,
        tiene_variantes: coloresAgregar.length ? 'SI' : 'NO', variantes: variantesTexto,
        categoria: document.getElementById('prodCategory').value
    };
    
    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    sonidos.guardado();
    toast('✅ PRODUCTO GUARDADO');
    resetForm();
    cargarProductosExistentes();
    cargarProductosEditor();
}

function resetForm() {
    document.getElementById('prodName').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodImage').value = '';
    document.getElementById('prodLink').value = '';
    document.getElementById('prodDesc').value = '';
    coloresAgregar = [];
    renderizarColoresAgregar();
    document.getElementById('jsonPreview').style.display = 'none';
}

function generateProductJSON() {
    const nombre = document.getElementById('prodName').value;
    if (!nombre) return toast('ESCRIBE NOMBRE PRIMERO', true);
    const coloresNombres = coloresAgregar.map(c => c.nombre).filter(n=>n).join(',');
    const coloresImagenes = coloresAgregar.map(c => c.imagen).filter(i=>i).join(',');
    const coloresPrecios = coloresAgregar.map(c => c.precio).filter(p=>p).join(',');
    const variantes = coloresAgregar.filter(c=>c.tallas.length).map(c=>`${c.nombre}:${c.tallas.map(t=>`${t.talla}:${t.precio}`).join(',')}`).join('|');
    const newId = productosActuales.length ? Math.max(...productosActuales.map(p=>p.id)) + 1 : 1;
    const row = [newId, nombre, document.getElementById('prodPrice').value, document.getElementById('prodPlatform').value,
        document.getElementById('prodImage').value || 'https://via.placeholder.com/300x200','SI',
        document.getElementById('prodDesc').value || 'Producto', coloresAgregar.length ? 'SI' : 'NO', variantes,
        document.getElementById('prodLink').value || '', document.getElementById('prodGender').value,
        coloresNombres, coloresImagenes, coloresPrecios, document.getElementById('prodCategory').value];
    document.getElementById('jsonArea').value = row.join('\t');
    document.getElementById('jsonPreview').style.display = 'block';
    sonidos.guardado();
    toast('📋 JSON GENERADO');
}

function copyJSON() { 
    initAudio();
    document.getElementById('jsonArea').select(); 
    document.execCommand('copy'); 
    sonidos.exito();
    toast('📋 COPIADO'); 
}

// ==================== TABS ====================
function configurarTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            initAudio();
            sonidos.click();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            if (target === 'agregar') document.getElementById('tabAgregar').style.display = 'block';
            if (target === 'editar') { document.getElementById('tabEditar').style.display = 'block'; cargarProductosEditor(); }
            if (target === 'pedidos') { document.getElementById('tabPedidos').style.display = 'block'; cargarPedidosAdmin(); }
            if (target === 'listar') { document.getElementById('tabListar').style.display = 'block'; cargarProductosExistentes(); }
        });
    });
    document.getElementById('tabAgregar').style.display = 'block';
}

function init() {
    renderizarColoresAgregar();
}
init();
</script>
