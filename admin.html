<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | TIENDA PRIVADA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #F5F9F7 0%, #EFF5F0 50%, #E8F1ED 100%);
            padding: 24px;
            color: #4a5d54;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 8px rgba(139, 195, 159, 0.3); } 50% { text-shadow: 0 0 16px rgba(139, 195, 159, 0.6); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 8px rgba(139, 195, 159, 0.2); } 50% { box-shadow: 0 0 16px rgba(139, 195, 159, 0.4); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Login */
        .login-box {
            max-width: 400px;
            margin: 15vh auto;
            padding: 45px;
            text-align: center;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8FDF9 100%);
            border: 2px solid #C7E5D8;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(139, 195, 159, 0.12), 0 2px 8px rgba(139, 195, 159, 0.08);
            position: relative;
            z-index: 10;
            animation: float 3s ease-in-out infinite;
        }
        
        .login-box h2 { 
            color: #6BA873; 
            margin-bottom: 28px; 
            font-size: 2rem; 
            font-weight: 700;
            animation: glow 2s ease-in-out infinite;
            letter-spacing: 1px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 14px 0;
            background: #F5FBF8;
            border: 2px solid #D8ECDF;
            border-radius: 12px;
            font-size: 1rem;
            color: #4a5d54;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .login-box input:focus { 
            outline: none; 
            border-color: #A8D5B8; 
            box-shadow: 0 0 16px rgba(168, 213, 184, 0.3), inset 0 0 8px rgba(168, 213, 184, 0.1);
            background: #FAFFFE;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, #A8D5B8 0%, #B8DFC7 100%);
            color: #FFF;
            border: 2px solid #A8D5B8;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            font-size: 1rem;
        }

        .login-box button:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(139, 195, 159, 0.2);
        }

        .login-box button:active {
            transform: translateY(-1px);
        }
        
        /* Panel Admin */
        .admin-panel { max-width: 1400px; margin: 0 auto; display: none; position: relative; z-index: 10; }
        
        /* Header */
        .neo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F5FBF8 100%);
            border: 2px solid #D8ECDF;
            border-radius: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 8px 24px rgba(139, 195, 159, 0.1);
            animation: slideDown 0.5s ease-out;
        }

        .logo-area h1 { 
            font-size: 1.5rem; 
            font-weight: 800;
            background: linear-gradient(135deg, #6BA873, #8BC39F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .badge { 
            background: linear-gradient(135deg, #D4F1D8, #E0F6E4);
            color: #4a7654;
            padding: 6px 18px; 
            border-radius: 20px; 
            font-size: 0.7rem; 
            font-weight: 700;
            margin-left: 12px;
            border: 1px solid #C7E5D8;
            letter-spacing: 0.5px;
        }

        .store-link a { 
            color: #6BA873; 
            text-decoration: none; 
            font-size: 0.9rem; 
            border-bottom: 2px solid #D8ECDF;
            transition: all 0.3s;
            font-weight: 600;
        }

        .store-link a:hover {
            color: #8BC39F;
            border-bottom-color: #A8D5B8;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F8FDF9 100%);
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 28px;
            border: 2px solid #D8ECDF;
            flex-wrap: wrap;
            box-shadow: 0 4px 16px rgba(139, 195, 159, 0.08);
        }

        .tab {
            padding: 12px 26px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #6BA873;
            border: 2px solid transparent;
            letter-spacing: 0.3px;
        }

        .tab:hover {
            border: 2px solid #D4F1D8;
            background: #F8FDF9;
        }

        .tab.active {
            background: linear-gradient(135deg, #A8D5B8, #B8DFC7);
            color: #FFF;
            box-shadow: 0 4px 12px rgba(139, 195, 159, 0.2);
            border: 2px solid #A8D5B8;
            font-weight: 700;
        }
        
        /* Cards */
        .card {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8FDF9 100%);
            border: 2px solid #D8ECDF;
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(139, 195, 159, 0.08);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: 0 8px 24px rgba(139, 195, 159, 0.12);
            border-color: #C7E5D8;
        }

        .card-title {
            font-weight: 700;
            color: #6BA873;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #E0F6E4;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        
        /* Formulario grid */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: #F5FBF8;
            border: 2px solid #D8ECDF;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            color: #4a5d54;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        input::placeholder, select option, textarea::placeholder {
            color: #A8D5B8;
        }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #A8D5B8; 
            box-shadow: 0 0 16px rgba(168, 213, 184, 0.2), inset 0 0 8px rgba(168, 213, 184, 0.08);
            background: #FAFFFE;
        }
        
        /* Botones */
        .btn { 
            padding: 12px 24px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s; 
            border: 2px solid;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.3px;
        }

        .btn-primary { 
            background: linear-gradient(105deg, #A8D5B8, #B8DFC7);
            border-color: #A8D5B8;
            color: #FFF;
            box-shadow: 0 4px 12px rgba(139, 195, 159, 0.15);
        }

        .btn-primary:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(139, 195, 159, 0.25);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-outline { 
            background: #F5FBF8;
            border: 2px solid #D8ECDF; 
            color: #6BA873;
        }

        .btn-outline:hover { 
            background: #E8F1ED;
            border-color: #A8D5B8;
            color: #5A916A;
        }

        .btn-danger { 
            background: linear-gradient(135deg, #F5C5C5, #F0B8B8);
            border-color: #E8A5A5;
            color: #8B5252;
        }

        .btn-danger:hover { 
            box-shadow: 0 4px 12px rgba(232, 165, 165, 0.2);
            transform: translateY(-3px);
        }
        
        /* Tabla */
        .table-wrapper { 
            overflow-x: auto; 
            border-radius: 12px; 
            background: #F5FBF8;
            border: 2px solid #D8ECDF;
            box-shadow: 0 4px 12px rgba(139, 195, 159, 0.08);
        }

        .data-table { width: 100%; border-collapse: collapse; min-width: 1200px; }

        .data-table th { 
            padding: 18px 14px; 
            text-align: left; 
            background: linear-gradient(135deg, #E8F1ED, #D4F1D8);
            color: #4a7654;
            font-weight: 700; 
            border-bottom: 2px solid #D8ECDF;
            letter-spacing: 0.3px;
        }

        .data-table td { 
            padding: 14px; 
            border-bottom: 1px solid #E8F1ED;
            vertical-align: middle;
            color: #4a5d54;
        }

        .data-table tr:hover { 
            background: #F8FDF9;
        }

        .id-link { 
            color: #6BA873; 
            font-weight: 700; 
            cursor: pointer; 
            text-decoration: underline;
            transition: all 0.3s;
        }

        .id-link:hover {
            color: #8BC39F;
        }
        
        /* Variantes */
        .color-chip { 
            background: #F5FBF8;
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 16px; 
            border: 2px solid #D8ECDF;
            box-shadow: 0 2px 8px rgba(139, 195, 159, 0.06);
            transition: all 0.3s;
        }

        .color-chip:hover {
            box-shadow: 0 4px 12px rgba(139, 195, 159, 0.12);
            border-color: #C7E5D8;
        }

        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }

        .tallas-group { 
            margin-left: 28px; 
            padding: 14px; 
            background: #EFF5F0;
            border-radius: 10px;
            border-left: 4px solid #A8D5B8;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 93, 84, 0.1); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s;
        }

        .modal-overlay.active { visibility: visible; opacity: 1; }

        .modal-container {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8FDF9 100%);
            max-width: 700px; 
            width: 90%; 
            max-height: 85vh; 
            overflow-y: auto;
            border-radius: 16px; 
            padding: 35px; 
            border: 2px solid #D8ECDF;
            box-shadow: 0 12px 40px rgba(139, 195, 159, 0.15);
            animation: slideDown 0.3s ease-out;
        }
        
        /* Toast */
        .toast { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            background: linear-gradient(135deg, #A8D5B8, #B8DFC7);
            color: #FFF;
            padding: 14px 28px; 
            border-radius: 10px; 
            z-index: 1100; 
            animation: slideDown 0.3s ease-out;
            font-weight: 700;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 20px rgba(139, 195, 159, 0.2);
            border: 2px solid #A8D5B8;
        }

        .toast.error {
            background: linear-gradient(135deg, #F5C5C5, #F0B8B8);
            color: #8B5252;
            border-color: #E8A5A5;
            box-shadow: 0 8px 20px rgba(232, 165, 165, 0.15);
        }
        
        .vacio { 
            text-align: center; 
            padding: 40px; 
            color: #8AB894;
            font-size: 1rem;
        }
        
        @media (max-width: 700px) { 
            .neo-header { flex-direction: column; text-align: center; } 
            .tabs { justify-content: center; } 
            .tab { padding: 10px 18px; font-size: 0.9rem; }
            .btn { padding: 10px 16px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginBox" class="login-box">

</div>

<script>
// ==================== SISTEMA DE SONIDOS ====================
const sonidos = {
    click: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.start(now);
        osc.stop(now + 0.05);
    },

    exito: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const notas = [800, 1000, 1200];
        notas.forEach((freq, i) => {
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.1);
            }, i * 60);
        });
    },

    error: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.12);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
    },

    guardado: () => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = 700 + (i * 200);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.08);
            }, i * 70);
        }
    }
};

let audioContextInicializado = false;
function initAudio() {
    if (!audioContextInicializado) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume();
        audioContextInicializado = true;
    }
}

// ==================== VARIABLES ====================
const API_URL = 'https://script.google.com/macros/s/AKfycby6Lzye_pHp4FgWkm5WRFwQwrN42Yc32KtABgiVJKl2fCXFu2QoH7yQnAiNomZURhSbnw/exec';
let productosActuales = [];
let coloresAgregar = [];

// ==================== LOGIN ====================
function handleLogin() {
    initAudio();
    const pass = document.getElementById('adminPass').value;
    if (pass === 'admin123') {
        sonidos.exito();
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        cargarProductosExistentes();
        cargarPedidosAdmin();
        cargarProductosEditor();
        configurarTabs();
        showWelcomeModal();
    } else {
        sonidos.error();
        toast('Contraseña incorrecta', true);
    }
}

document.getElementById('adminPass').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleLogin();
});

function toast(msg, isError = false) {
    initAudio();
    if (!isError) sonidos.click();
    const t = document.createElement('div'); 
    t.className = 'toast'; 
    if (isError) t.className += ' error';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function showWelcomeModal() {
    let modalDiv = document.createElement('div');
    modalDiv.className = 'modal-overlay';
    modalDiv.innerHTML = `
        <div class="modal-container" style="text-align:center; max-width:500px;">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">✨</div>
            <h2 style="color:#6BA873; margin: 10px 0; font-size: 1.8rem; font-weight: 700;">¡Bienvenido!</h2>
            <p style="color:#8AB894; margin: 10px 0; font-size: 1rem;">Sesión iniciada correctamente</p>
            <div style="background: linear-gradient(135deg, rgba(168,213,184,0.1), rgba(184,223,199,0.1)); border: 2px solid #D8ECDF; border-radius: 12px; padding: 20px; margin: 20px 0;">
                <div style="display:flex; justify-content:space-between; color: #6BA873; margin: 8px 0; font-weight: 600;"><span>📦 Productos</span><strong id="welcomeProducts" style="color: #8BC39F;">0</strong></div>
                <div style="display:flex; justify-content:space-between; color: #6BA873; margin: 8px 0; font-weight: 600;"><span>📦 Pedidos</span><strong id="welcomeOrders" style="color: #8BC39F;">0</strong></div>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="this.closest('.modal-overlay').remove()">Entrar al panel</button>
        </div>
    `;
    document.body.appendChild(modalDiv);
    setTimeout(() => modalDiv.classList.add('active'), 10);
    fetch(`${API_URL}?action=getProductos`).then(r=>r.json()).then(p=> document.getElementById('welcomeProducts').innerText = p.length);
    fetch(`${API_URL}?action=getPedidosConEnlaces`).then(r=>r.json()).then(p=> document.getElementById('welcomeOrders').innerText = p.length);
}

// ==================== OBTENER ÚLTIMO ID CORRECTO ====================
async function obtenerUltimoIdCorrecto() {
    try {
        const response = await fetch(`${API_URL}?action=getProductos&t=${Date.now()}`);
        const productos = await response.json();
        if (productos && productos.length > 0) {
            const maxId = Math.max(...productos.map(p => parseInt(p.id) || 0));
            console.log(`📊 Último ID encontrado: ${maxId}, Total productos: ${productos.length}`);
            return maxId;
        }
        return 0;
    } catch (error) {
        console.error('Error obteniendo último ID:', error);
        return 0;
    }

function renderizarEditorProductos() {

function addColorVariant() { coloresAgregar.push({ id: Date.now(), nombre: '', imagen: '', precio: '', tallas: [] }); renderizarColoresAgregar(); }
function removeColorVariant(id) { coloresAgregar = coloresAgregar.filter(c => c.id !== id); renderizarColoresAgregar(); }
function updateColorField(id, field, val) { const c = coloresAgregar.find(c => c.id === id); if(c) c[field] = val; }
function addSizeToColor(id) { const c = coloresAgregar.find(c => c.id === id); if(c) c.tallas.push({ talla: '', precio: '' }); renderizarColoresAgregar(); }
function removeSize(colorId, idx) { const c = coloresAgregar.find(c => c.id === colorId); if(c) c.tallas.splice(idx,1); renderizarColoresAgregar(); }
function updateSize(colorId, idx, field, val) { const c = coloresAgregar.find(c => c.id === colorId); if(c && c.tallas[idx]) c.tallas[idx][field] = val; }

function renderizarColoresAgregar() {
    const container = document.getElementById('variantsContainer');
    if (!container) return;
    if (!coloresAgregar.length) { container.innerHTML = '<p style="color:#8AB894;">Agrega colores con tallas</p>'; return; }
    container.innerHTML = coloresAgregar.map(c => `
        <div class="color-chip">
            <div class="flex-row">
                <input type="text" placeholder="Color" value="${c.nombre}" style="flex:2" onchange="updateColorField(${c.id},'nombre',this.value)">
                <input type="text" placeholder="Imagen URL" value="${c.imagen}" style="flex:3" onchange="updateColorField(${c.id},'imagen',this.value)">
                <input type="number" placeholder="Precio" value="${c.precio}" step="0.01" style="flex:1" onchange="updateColorField(${c.id},'precio',parseFloat(this.value) || 0)">
                <button class="btn btn-danger" style="padding: 8px 12px;" onclick="removeColorVariant(${c.id})">🗑️</button>
            </div>
            <div class="tallas-group">
                <strong style="color: #6BA873;">📏 Tallas</strong>
                <div style="margin-top: 10px;">
                    ${c.tallas.map((t, idx) => `
                        <div class="flex-row" style="margin-bottom: 10px;">
                            <input type="text" placeholder="Talla" value="${t.talla}" style="width:100px; margin-right: 8px;" onchange="updateSize(${c.id},${idx},'talla',this.value)">
                            <input type="number" placeholder="Precio" value="${t.precio}" step="0.01" style="width:140px; margin-right: 8px;" onchange="updateSize(${c.id},${idx},'precio',parseFloat(this.value) || 0)">
                            <button class="btn btn-danger" style="padding: 6px 12px;" onclick="removeSize(${c.id},${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-outline" onclick="addSizeToColor(${c.id})" style="margin-top: 10px;">+ Talla</button>
            </div>
        </div>
    `).join('');
}

async function saveProduct() {
    initAudio();
    const nombre = document.getElementById('prodName').value;
    const precioBase = parseFloat(document.getElementById('prodPrice').value);
    if (!nombre || !precioBase) { sonidos.error(); toast('Campos requeridos', true); return; }
    
    // 🔥 OBTENER EL ÚLTIMO ID CORRECTO ANTES DE GUARDAR
    const ultimoId = await obtenerUltimoIdCorrecto();
    const nuevoId = ultimoId + 1;
    
    console.log(`📝 Guardando producto con ID: ${nuevoId} (último ID era: ${ultimoId})`);
    
    const coloresNombres = coloresAgregar.map(c => c.nombre).filter(n => n).join(',');
    const coloresImagenes = coloresAgregar.map(c => c.imagen).filter(i => i).join(',');
    const coloresPrecios = coloresAgregar.map(c => c.precio).filter(p => p).join(',');
    let variantesTexto = '';
    if (coloresAgregar.length) {
        variantesTexto = coloresAgregar.filter(c => c.tallas.length).map(c => `${c.nombre}:${c.tallas.map(t => `${t.talla}:${t.precio}`).join(',')}`).join('|');
    }
    
    const payload = {
        action: 'agregarProducto',
        id: nuevoId,  // Enviar el ID calculado
        nombre: nombre,
        precio: precioBase,
        origen: document.getElementById('prodPlatform').value,
        imagen: document.getElementById('prodImage').value || 'https://via.placeholder.com/300x200',
        enlace: document.getElementById('prodLink').value || '',
        categoria_genero: document.getElementById('prodGender').value,
        descripcion: document.getElementById('prodDesc').value || 'Producto',
        colores_nombres: coloresNombres,
        colores_imagenes: coloresImagenes,
        colores_precios: coloresPrecios,
        tiene_variantes: coloresAgregar.length ? 'SI' : 'NO',
        variantes: variantesTexto,
        categoria: document.getElementById('prodCategory').value,
        activo: 'SI'
    };
    
    // Usar un iframe oculto para evitar problemas de CORS
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = API_URL;
    form.target = 'hiddenFrame';
    form.style.display = 'none';
    
    const input = document.createElement('input');
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);
    
    document.body.appendChild(form);
    
    // Crear iframe oculto si no existe
    let iframe = document.getElementById('hiddenFrame');
    if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.name = 'hiddenFrame';
        iframe.id = 'hiddenFrame';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
    }
    
    // Escuchar respuesta
    iframe.onload = function() {
        sonidos.guardado();
        toast(`✅ Producto "${nombre}" guardado con ID: ${nuevoId}`);
        resetForm();
        setTimeout(() => {
            cargarProductosExistentes();
            cargarProductosEditor();
        }, 1500);
    };
    
    form.submit();
    setTimeout(() => {
        if (document.body.contains(form)) document.body.removeChild(form);
    }, 1000);
}

function resetForm() {
    document.getElementById('prodName').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodImage').value = '';
    document.getElementById('prodLink').value = '';
    document.getElementById('prodDesc').value = '';
    document.getElementById('prodCategory').value = '';
    document.getElementById('prodGender').value = 'unisex';
    document.getElementById('prodPlatform').value = 'Amazon';

}

function generateProductJSON() {
    const nombre = document.getElementById('prodName').value;
    if (!nombre) return toast('Escribe nombre primero', true);
    const coloresNombres = coloresAgregar.map(c => c.nombre).filter(n=>n).join(',');
    const coloresImagenes = coloresAgregar.map(c => c.imagen).filter(i=>i).join(',');
    const coloresPrecios = coloresAgregar.map(c => c.precio).filter(p=>p).join(',');
    const variantes = coloresAgregar.filter(c=>c.tallas.length).map(c=>`${c.nombre}:${c.tallas.map(t=>`${t.talla}:${t.precio}`).join(',')}`).join('|');
    const newId = productosActuales.length ? Math.max(...productosActuales.map(p=>p.id)) + 1 : 1;
    const row = [newId, nombre, document.getElementById('prodPrice').value, document.getElementById('prodPlatform').value,
        document.getElementById('prodImage').value || 'https://via.placeholder.com/300x200','SI',
        document.getElementById('prodDesc').value || 'Producto', coloresAgregar.length ? 'SI' : 'NO', variantes,
        document.getElementById('prodLink').value || '', document.getElementById('prodGender').value,
        coloresNombres, coloresImagenes, coloresPrecios, document.getElementById('prodCategory').value];
    document.getElementById('jsonArea').value = row.join('\t');
    document.getElementById('jsonPreview').style.display = 'block';
    sonidos.guardado();
    toast('📋 JSON generado');
}

function copyJSON() { 
    initAudio();
    document.getElementById('jsonArea').select(); 
    document.execCommand('copy');

    toast('📋 Copiado'); 
}

function configurarTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            initAudio();
            sonidos.click();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            if (target === 'agregar') document.getElementById('tabAgregar').style.display = 'block';
            if (target === 'editar') { document.getElementById('tabEditar').style.display = 'block'; cargarProductosEditor(); }
            if (target === 'pedidos') { document.getElementById('tabPedidos').style.display = 'block'; cargarPedidosAdmin(); }
            if (target === 'listar') { document.getElementById('tabListar').style.display = 'block'; cargarProductosExistentes(); }
        });
    });
    document.getElementById('tabAgregar').style.display = 'block';
