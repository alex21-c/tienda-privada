<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDA PRIVADA</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛍️%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #FDFBF7 0%, #f0ece6 100%);
            padding: 20px;
            color: #4A4A4A;
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 48px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 1px solid rgba(163,184,164,0.2); }
        
        /* Logo */
        .logo-container { text-align: center; margin-bottom: 30px; padding: 20px; background: transparent; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .logo-imagen { height: 80px; width: auto; object-fit: contain; border-radius: 12px; }
        .logo-title { font-size: 1.5rem; font-weight: 600; color: #2d3436; margin: 0; letter-spacing: 2px; }
        .logo-subtitle { font-size: 0.65rem; color: #A3B8A4; margin: 5px 0 0 0; letter-spacing: 1.5px; }
        @media (max-width:768px){ .logo-imagen { height: 55px; } .logo-title { font-size: 1.1rem; } }
        
        /* Top bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        
        /* Filtros principales */
        .filtros-principales { display: flex; gap: 10px; flex-wrap: wrap; }
        .filtro-btn { padding: 10px 24px; background: transparent; border: 1.5px solid #E5E5E5; border-radius: 60px; cursor: pointer; transition: all 0.3s; color: #9CA3AF; font-weight: 500; }
        .filtro-btn.active { background: linear-gradient(135deg, #F4A0B5 0%, #e08ca1 100%); border-color: #F4A0B5; color: white; box-shadow: 0 4px 12px rgba(244,160,181,0.3); }
        .filtro-btn:hover:not(.active) { border-color: #A3B8A4; color: #A3B8A4; }
        
        /* Subcategorías (futuristas) */
        .subcategorias-container {
            margin: 15px 0;
            padding: 12px 0;
            border-radius: 80px;
            background: rgba(163,184,164,0.05);
            backdrop-filter: blur(4px);
            display: none;
        }
        .subcategorias-container.visible { display: block; }
        .subcategorias {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .subcat-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(163,184,164,0.3);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            color: #8A9A8C;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .subcat-btn.active { background: linear-gradient(135deg, #A3B8A4 0%, #8ba08c 100%); color: white; border-color: #A3B8A4; box-shadow: 0 4px 12px rgba(163,184,164,0.2); }
        .subcat-btn:hover:not(.active) { background: rgba(163,184,164,0.15); border-color: #A3B8A4; }
        
        /* Filtros de género (futuristas) */
        .genero-container {
            margin: 15px 0;
            padding: 12px 0;
            background: rgba(244,160,181,0.05);
            border-radius: 80px;
            display: none;
        }
        .genero-container.visible { display: block; }
        .genero-filtros {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .genero-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(244,160,181,0.3);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            color: #C4A5A5;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .genero-btn.active { background: linear-gradient(135deg, #F4A0B5 0%, #e08ca1 100%); color: white; border-color: #F4A0B5; }
        .genero-btn:hover:not(.active) { background: rgba(244,160,181,0.15); border-color: #F4A0B5; }
        
        .acciones-top { display: flex; gap: 15px; }
        .mis-pedidos-btn, .carrito-btn { background: transparent; border: 1.5px solid #A3B8A4; color: #A3B8A4; padding: 8px 20px; border-radius: 60px; cursor: pointer; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .mis-pedidos-btn:hover, .carrito-btn:hover { background: #A3B8A4; color: white; transform: translateY(-2px); }
        .carrito-contador { background: #F4A0B5; color: white; border-radius: 50px; padding: 2px 10px; font-size: 0.75rem; margin-left: 8px; }
        
        /* Productos grid */
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .producto-card { background: white; border-radius: 28px; overflow: hidden; transition: all 0.35s; border: 1px solid #E5E5E5; cursor: pointer; }
        .producto-card:hover { transform: translateY(-8px); box-shadow: 0 20px 35px rgba(163,184,164,0.15); border-color: #F4A0B5; }
        .producto-imagen { width: 100%; height: 260px; object-fit: cover; transition: transform 0.4s; }
        .producto-card:hover .producto-imagen { transform: scale(1.05); }
        .producto-info { padding: 16px; }
        .producto-origen, .producto-categoria { display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 0.7rem; font-weight: 600; margin-right: 6px; margin-bottom: 8px; }
        .origen-amazon { background: #ff990020; color: #ff9900; border: 1px solid #ff990040; }
        .origen-temu { background: #e74c3c20; color: #e74c3c; border: 1px solid #e74c3c40; }
        .origen-shein { background: #E84C8B20; color: #E84C8B; border: 1px solid #E84C8B40; }
        .producto-genero { display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 0.7rem; background: #F8F9FA; color: #A3B8A4; border: 1px solid #E5E5E5; }
        .producto-titulo { font-size: 1rem; font-weight: 600; color: #2d3436; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .producto-precio { font-size: 1.4rem; font-weight: 700; color: #A3B8A4; margin: 10px 0; }
        .btn-agregar { width: 100%; background: #A3B8A4; color: white; border: none; padding: 12px; border-radius: 60px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-agregar:hover { background: #F4A0B5; transform: translateY(-2px); }
        
        /* Carrito panel */
        .carrito-panel { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: white; z-index: 1001; transition: right 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding: 20px; overflow-y: auto; }
        .carrito-panel.open { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .overlay.active { display: block; }
        
        .vacio { text-align: center; color: #9CA3AF; padding: 40px; }
        .loading { text-align: center; padding: 40px; color: #9CA3AF; }
        
        /* Modal producto futurista */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 10000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(248,245,240,0.98) 100%); max-width: 520px; width: 90%; max-height: 85vh; border-radius: 48px; overflow-y: auto; border: 1px solid rgba(163,184,164,0.3); }
        .modal-cerrar { position: sticky; top: 20px; float: right; background: rgba(163,184,164,0.15); border: 1px solid rgba(163,184,164,0.4); width: 44px; height: 44px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 10px; }
        .modal-precio-section { background: linear-gradient(135deg, #A3B8A4 0%, #8ba08c 100%); border-radius: 40px; padding: 16px 20px; margin: 0 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        #modal-precio { color: white; font-size: 2rem; font-weight: 800; }
        .modal-producto-imagen-container { cursor: zoom-in; border-radius: 32px; margin: 20px; overflow: hidden; }
        #modal-agregar { width: calc(100% - 40px); margin: 0 20px 20px; background: linear-gradient(135deg, #A3B8A4 0%, #8ba08c 100%); color: white; border: none; padding: 16px; border-radius: 44px; font-weight: 700; cursor: pointer; }
        
        /* Zoom modal */
        .zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; justify-content: center; align-items: center; }
        .zoom-modal.active { display: flex; }
        .zoom-modal-img { max-width: 90%; max-height: 85vh; object-fit: contain; border-radius: 16px; }
        .zoom-modal-close { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); border: 2px solid white; width: 48px; height: 48px; border-radius: 50%; font-size: 28px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        
        @media (max-width:768px){
            .container { padding: 20px; }
            .productos-grid { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; }
            .carrito-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <!-- LOGO -->
    <div class="logo-container">
        <div class="logo">
            <img src="logo.png" alt="TIENDA PRIVADA" class="logo-imagen" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
            <div class="logo-text">
                <h1 class="logo-title">TIENDA PRIVADA</h1>
                <p class="logo-subtitle">ESTILO · EXCLUSIVIDAD · SEGURIDAD</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="filtros-principales">
                <button class="filtro-btn active" data-filtro="todos">Todos</button>
                <button class="filtro-btn" data-filtro="Amazon">Amazon</button>
                <button class="filtro-btn" data-filtro="Temu">Temu</button>
                <button class="filtro-btn" data-filtro="Shein">Shein</button>
            </div>
            <div class="acciones-top">
                <button id="toggle-mis-pedidos" class="mis-pedidos-btn">📦 Mis Pedidos</button>
                <button id="carrito-toggle" class="carrito-btn">🛒 Carrito <span id="carrito-contador" class="carrito-contador">0</span></button>
            </div>
        </div>
        
        <!-- Subcategorías futuristas -->
        <div id="subcategorias-container" class="subcategorias-container">
            <div class="subcategorias">
                <button class="subcat-btn" data-subcat="ropa">👕 Ropa</button>
                <button class="subcat-btn" data-subcat="zapatos">👟 Zapatos</button>
                <button class="subcat-btn" data-subcat="accesorios">💍 Accesorios</button>
                <button class="subcat-btn" data-subcat="cuidado_piel">🧴 Cuidado de la piel</button>
                <button class="subcat-btn" data-subcat="cuidado_cabello">💇 Cuidado del cabello</button>
                <button class="subcat-btn" data-subcat="electronica">📱 Electrónica</button>
            </div>
        </div>
        
        <!-- Filtros de género futuristas -->
        <div id="genero-container" class="genero-container">
            <div class="genero-filtros">
                <button class="genero-btn active" data-genero="todos">Todos</button>
                <button class="genero-btn" data-genero="mujer">👩 Mujer</button>
                <button class="genero-btn" data-genero="hombre">👨 Hombre</button>
                <button class="genero-btn" data-genero="niño">👦 Niño</button>
                <button class="genero-btn" data-genero="niña">👧 Niña</button>
                <button class="genero-btn" data-genero="unisex">👥 Unisex</button>
            </div>
        </div>
        
        <!-- Productos -->
        <div id="productos" class="productos-grid"><div class="loading">Cargando productos...</div></div>
        
        <!-- Formulario pedido oculto -->
        <div id="formulario-datos" style="display:none;" class="formulario-pedido"></div>
    </div>
    
    <!-- Carrito panel -->
    <div id="carrito-panel" class="carrito-panel"><div class="carrito-panel-header"><h3>Mi Carrito</h3><button id="cerrar-carrito">✕</button></div><div id="carrito-lista-panel">✨ Vacío</div><div class="carrito-total-panel"><strong>Total</strong><span id="total-panel">$0.00</span></div><button id="ir-pagar">Ir a pagar</button></div>
    <div id="overlay" class="overlay"></div>
    
    <!-- Modal producto -->
    <div id="producto-modal" class="modal"><div class="modal-content"><span class="modal-cerrar">&times;</span><div class="modal-producto-imagen-container"><img id="modal-imagen" src=""></div><h2 id="modal-nombre" style="padding:0 20px"></h2><div class="modal-producto-meta" style="padding:0 20px"><p id="modal-origen"></p><p id="modal-genero"></p></div><p id="modal-descripcion" style="margin:0 20px 20px"></p><div class="modal-precio-section"><span>PRECIO</span><span id="modal-precio"></span></div><div id="modal-colores" style="margin:0 20px"><label>🎨 Color:</label><div id="selector-color"></div></div><div id="modal-variantes" style="margin:0 20px;display:none"><label>📏 Talla:</label><select id="selector-variante"></select></div><button id="modal-agregar">➕ Agregar al carrito</button></div></div>
    
    <!-- Zoom modal -->
    <div id="zoom-imagen-modal" class="zoom-modal"><div class="zoom-modal-content"><img id="zoom-imagen" class="zoom-modal-img"><button class="zoom-modal-close" id="zoom-cerrar">✕</button></div></div>
    
    <!-- Modales adicionales -->
    <div id="pago-modal" class="modal"><div class="modal-content"><span class="modal-cerrar-pago">&times;</span><h2>📋 Datos</h2><form id="pedido-form-modal"><input type="text" id="nombre-modal" placeholder="Nombre"><input type="tel" id="telefono-modal" placeholder="Teléfono"><textarea id="direccion-modal" rows="3" placeholder="Dirección"></textarea><select id="metodo-pago-modal"><option value="Efectivo">Efectivo</option><option value="Yappy">Yappy</option><option value="Transferencia">Transferencia</option></select><button type="submit">Confirmar</button></form></div></div>
    <div id="yappy-modal" class="modal"><div class="modal-content"><span class="modal-cerrar-yappy">&times;</span><h3>Yappy</h3><p id="yappy-telefono">6474-5914</p><button id="copiar-yappy">Copiar</button><button id="ya-pague">Ya pagué</button></div></div>
    <div id="confirmar-pago-modal" class="modal"><div class="modal-content"><span class="modal-cerrar-confirmar">&times;</span><h3>Confirmar</h3><input type="text" id="nombre-verificar" placeholder="Tu nombre"><button id="verificar-pago">Verificar</button></div></div>
    <div id="factura-modal" class="modal"><div class="modal-content"><span class="modal-cerrar-factura">&times;</span><div id="factura-contenido"></div><button id="descargar-factura">Descargar</button></div></div>
    <div id="mis-pedidos-modal" class="modal"><div class="modal-content"><span class="modal-cerrar-mis-pedidos">&times;</span><h3>Mis Pedidos</h3><input type="text" id="nombre-consulta-modal" placeholder="Tu nombre"><button id="buscar-pedidos-modal">Buscar</button><div id="resultado-pedidos-modal"></div></div></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby6Lzye_pHp4FgWkm5WRFwQwrN42Yc32KtABgiVJKl2fCXFu2QoH7yQnAiNomZURhSbnw/exec';
let productos = [], carrito = [], productoActual = null, colorSeleccionado = null, tallaSeleccionada = null;
let filtroPlataforma = 'todos', filtroSubcat = null, filtroGenero = 'todos';

// Cargar productos
async function cargarProductos() {
    try {
        const res = await fetch(`${API_URL}?action=getProductos&t=${Date.now()}`);
        productos = await res.json();
        mostrarProductos();
    } catch(e) { console.error(e); }
}

function getIconoGenero(g) { return { hombre:'👨', mujer:'👩', niño:'👦', niña:'👧', unisex:'👥' }[g] || '👤'; }

function mostrarProductos() {
    let filtrados = productos.filter(p => {
        if (filtroPlataforma !== 'todos' && p.origen !== filtroPlataforma) return false;
        if (filtroSubcat && p.categoria !== filtroSubcat) return false;
        if (filtroGenero !== 'todos' && p.genero !== filtroGenero) return false;
        return true;
    });
    const contenedor = document.getElementById('productos');
    if (!filtrados.length) { contenedor.innerHTML = '<p class="loading">No hay productos</p>'; return; }
    contenedor.innerHTML = filtrados.map(p => `
        <div class="producto-card" onclick="mostrarModal(${p.id})">
            <img src="${p.imagen}" class="producto-imagen" onerror="this.src='https://via.placeholder.com/300x200'">
            <div class="producto-origen origen-${(p.origen || 'temu').toLowerCase()}">${p.origen}</div>
            <div class="producto-genero">${getIconoGenero(p.genero)} ${p.genero || 'Unisex'}</div>
            ${p.categoria ? `<div class="producto-categoria">📂 ${p.categoria}</div>` : ''}
            <h3 class="producto-titulo">${p.nombre}</h3>
            <div class="producto-precio">$${p.precio.toFixed(2)}</div>
            <button class="btn-agregar" onclick="event.stopPropagation(); agregarAlCarrito(${p.id})">➕ Agregar</button>
        </div>
    `).join('');
}

// Filtros con subcategorías y género
document.querySelectorAll('.filtro-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroPlataforma = btn.dataset.filtro;
        filtroSubcat = null;
        filtroGenero = 'todos';
        
        // Resetear subcategorías
        document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.genero-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.genero-btn[data-genero="todos"]').classList.add('active');
        
        const subcatContainer = document.getElementById('subcategorias-container');
        const generoContainer = document.getElementById('genero-container');
        
        if (filtroPlataforma !== 'todos') {
            subcatContainer.classList.add('visible');
            generoContainer.classList.remove('visible');
        } else {
            subcatContainer.classList.remove('visible');
            generoContainer.classList.remove('visible');
        }
        mostrarProductos();
    });
});

document.querySelectorAll('.subcat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroSubcat = btn.dataset.subcat;
        document.getElementById('genero-container').classList.add('visible');
        filtroGenero = 'todos';
        document.querySelectorAll('.genero-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.genero-btn[data-genero="todos"]').classList.add('active');
        mostrarProductos();
    });
});

document.querySelectorAll('.genero-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.genero-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtroGenero = btn.dataset.genero;
        mostrarProductos();
    });
});

// Modal producto
function mostrarModal(id) {
    productoActual = productos.find(p => p.id == id);
    if(!productoActual) return;
    document.getElementById('modal-imagen').src = productoActual.imagen;
    document.getElementById('modal-nombre').textContent = productoActual.nombre;
    document.getElementById('modal-origen').textContent = productoActual.origen;
    document.getElementById('modal-genero').textContent = `${getIconoGenero(productoActual.genero)} ${productoActual.genero || 'Unisex'}`;
    document.getElementById('modal-descripcion').textContent = productoActual.descripcion || `Producto de ${productoActual.origen}`;
    document.getElementById('modal-precio').textContent = `$${productoActual.precio.toFixed(2)}`;
    
    // Colores
    const coloresDiv = document.getElementById('selector-color');
    if(productoActual.colores?.length) {
        document.getElementById('modal-colores').style.display = 'block';
        coloresDiv.innerHTML = productoActual.colores.map((c,i) => `<button style="padding:8px 20px;border-radius:40px;border:2px solid ${i===0?'#00D4FF':'#ccc'};background:${i===0?'#00D4FF':'white'}" data-color="${c.nombre}">${c.nombre}</button>`).join('');
        document.querySelectorAll('#selector-color button').forEach((btn,i) => {
            btn.onclick = () => {
                colorSeleccionado = productoActual.colores[i];
                document.getElementById('modal-imagen').src = colorSeleccionado.imagen;
                document.getElementById('modal-precio').textContent = `$${colorSeleccionado.precio.toFixed(2)}`;
                if(colorSeleccionado.tallas?.length) mostrarTallas(colorSeleccionado.tallas);
                else document.getElementById('modal-variantes').style.display = 'none';
            };
        });
        colorSeleccionado = productoActual.colores[0];
        if(colorSeleccionado.tallas?.length) mostrarTallas(colorSeleccionado.tallas);
    } else {
        document.getElementById('modal-colores').style.display = 'none';
        if(productoActual.variantes && typeof productoActual.variantes === 'string') {
            const tallas = productoActual.variantes.split(',').map(t => { const [talla,precio] = t.split(':'); return { talla, precio: parseFloat(precio) }; });
            mostrarTallas(tallas);
        }
    }
    document.getElementById('producto-modal').style.display = 'flex';
    configurarZoom();
}

function mostrarTallas(tallas) {
    if(!tallas?.length) return;
    const sel = document.getElementById('selector-variante');
    document.getElementById('modal-variantes').style.display = 'block';
    sel.innerHTML = '<option value="">Selecciona talla</option>' + tallas.map(t => `<option value="${t.precio}" data-talla="${t.talla}">${t.talla} - $${t.precio.toFixed(2)}</option>`).join('');
    sel.onchange = () => {
        tallaSeleccionada = sel.value ? { talla: sel.selectedOptions[0].dataset.talla, precio: parseFloat(sel.value) } : null;
        document.getElementById('modal-precio').textContent = tallaSeleccionada ? `$${tallaSeleccionada.precio.toFixed(2)}` : `$${colorSeleccionado?.precio.toFixed(2) || productoActual.precio.toFixed(2)}`;
    };
}

function agregarDesdeModal() {
    let precio = productoActual.precio, nombre = productoActual.nombre;
    if(colorSeleccionado) { precio = colorSeleccionado.precio; nombre += ` (${colorSeleccionado.nombre})`; }
    if(tallaSeleccionada) { precio = tallaSeleccionada.precio; nombre += ` - Talla: ${tallaSeleccionada.talla}`; }
    let existente = carrito.find(i => i.id === productoActual.id && i.nombre === nombre);
    if(existente) existente.cantidad++;
    else carrito.push({ id: productoActual.id, nombre, precio, origen: productoActual.origen, cantidad: 1 });
    localStorage.setItem('carrito', JSON.stringify(carrito));
    actualizarCarrito();
    cerrarModal();
}

function agregarAlCarrito(id) { mostrarModal(id); }
function cerrarModal() { document.getElementById('producto-modal').style.display = 'none'; colorSeleccionado = null; tallaSeleccionada = null; }

function actualizarCarrito() {
    const total = carrito.reduce((s,i) => s + i.precio * i.cantidad, 0);
    const items = carrito.reduce((s,i) => s + i.cantidad, 0);
    document.getElementById('carrito-contador').textContent = items;
    document.getElementById('total-panel').textContent = total.toFixed(2);
    const panel = document.getElementById('carrito-lista-panel');
    if(!carrito.length) panel.innerHTML = '<div class="vacio">✨ Vacío</div>';
    else panel.innerHTML = carrito.map(i => `<div>${i.nombre} x${i.cantidad} - $${(i.precio*i.cantidad).toFixed(2)}<button onclick="eliminarItem(${i.id},'${i.nombre}')">🗑️</button></div>`).join('');
}
function eliminarItem(id,nombre) { carrito = carrito.filter(i => !(i.id==id && i.nombre==nombre)); localStorage.setItem('carrito',JSON.stringify(carrito)); actualizarCarrito(); }

// Zoom imagen
function configurarZoom() {
    let img = document.getElementById('modal-imagen');
    let clone = img.cloneNode(true);
    img.parentNode.replaceChild(clone, img);
    clone.style.cursor = 'zoom-in';
    clone.onclick = () => window.abrirZoom(clone.src);
}
window.abrirZoom = (url) => { document.getElementById('zoom-imagen').src = url; document.getElementById('zoom-imagen-modal').classList.add('active'); };
window.cerrarZoom = () => document.getElementById('zoom-imagen-modal').classList.remove('active');
document.getElementById('zoom-cerrar').onclick = window.cerrarZoom;
document.getElementById('zoom-imagen-modal').onclick = e => { if(e.target.classList.contains('zoom-modal')) window.cerrarZoom(); };
document.getElementById('modal-agregar').onclick = agregarDesdeModal;
document.querySelector('.modal-cerrar').onclick = cerrarModal;

// Carrito UI
document.getElementById('carrito-toggle').onclick = () => document.getElementById('carrito-panel').classList.toggle('open');
document.getElementById('cerrar-carrito').onclick = () => document.getElementById('carrito-panel').classList.remove('open');
document.getElementById('ir-pagar').onclick = () => { document.getElementById('carrito-panel').classList.remove('open'); document.getElementById('pago-modal').style.display = 'flex'; };
document.getElementById('pedido-form-modal').onsubmit = async (e) => { e.preventDefault(); alert('Pedido enviado'); carrito=[]; localStorage.setItem('carrito',JSON.stringify(carrito)); actualizarCarrito(); document.getElementById('pago-modal').style.display = 'none'; };

// Mis pedidos
document.getElementById('toggle-mis-pedidos').onclick = () => document.getElementById('mis-pedidos-modal').style.display = 'flex';
document.getElementById('buscar-pedidos-modal').onclick = async () => {
    let nombre = document.getElementById('nombre-consulta-modal').value;
    let res = await fetch(`${API_URL}?action=getPedidosByNombre&nombre=${encodeURIComponent(nombre)}`);
    let pedidos = await res.json();
    document.getElementById('resultado-pedidos-modal').innerHTML = pedidos.map(p => `<div><b>#${p.id}</b> - ${p.estado} - $${p.total}</div>`).join('') || '<p>No hay pedidos</p>';
};

// Iniciar
cargarProductos();
let saved = localStorage.getItem('carrito');
if(saved) carrito = JSON.parse(saved);
actualizarCarrito();
</script>
</body>
