<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDA PRIVADA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FDFBF7 0%, #f0ece6 100%);
            padding: 20px;
            color: #2d3436;
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
        }

        /* Logo */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-title { font-size: 1.8rem; font-weight: 700; color: #2d3436; letter-spacing: 2px; }
        .logo-subtitle { font-size: 0.7rem; color: #A3B8A4; letter-spacing: 2px; }

        /* Filtros */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .filtros-principales { display: flex; gap: 10px; flex-wrap: wrap; }
        .filtro-btn { padding: 10px 24px; border: 1.5px solid #E5E5E5; border-radius: 60px; cursor: pointer; transition: 0.3s; background: white; color: #9CA3AF; }
        .filtro-btn.active { background: #F4A0B5; border-color: #F4A0B5; color: white; }

        .subcategorias-container, .genero-container { 
            margin: 15px 0; 
            padding: 15px; 
            background: rgba(163,184,164,0.05); 
            border-radius: 30px; 
            display: none; 
            text-align: center;
        }
        .visible { display: block !important; }
        .subcat-btn, .genero-btn { 
            padding: 8px 18px; 
            margin: 4px; 
            border: 1px solid #ddd; 
            border-radius: 50px; 
            background: white; 
            cursor: pointer; 
            font-size: 0.85rem;
        }
        .subcat-btn.active, .genero-btn.active { background: #A3B8A4; color: white; border-color: #A3B8A4; }

        /* Grid de Productos */
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .producto-card { background: white; border-radius: 20px; border: 1px solid #eee; padding: 15px; transition: 0.3s; cursor: pointer; }
        .producto-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .producto-imagen { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; }
        .producto-precio { font-size: 1.2rem; font-weight: 700; color: #A3B8A4; margin: 10px 0; }
        .btn-agregar { width: 100%; padding: 10px; background: #A3B8A4; color: white; border: none; border-radius: 50px; cursor: pointer; }

        /* Modales */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 30px; border-radius: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        
        /* Carrito */
        .carrito-panel { 
            position: fixed; top: 0; right: -100%; width: 400px; height: 100%; 
            background: white; z-index: 1001; transition: 0.4s; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); 
        }
        .carrito-panel.open { right: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1000; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1 class="logo-title">TIENDA PRIVADA</h1>
        <p class="logo-subtitle">ESTILO • EXCLUSIVIDAD • SEGURIDAD</p>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="filtros-principales">
                <button class="filtro-btn active" data-filtro="todos">Todos</button>
                <button class="filtro-btn" data-filtro="Amazon">Amazon</button>
                <button class="filtro-btn" data-filtro="Temu">Temu</button>
                <button class="filtro-btn" data-filtro="Shein">Shein</button>
            </div>
            <div>
                <button id="carrito-toggle" style="padding: 10px 20px; border-radius: 50px; cursor: pointer;">
                    🛒 Carrito (<span id="carrito-contador">0</span>)
                </button>
            </div>
        </div>

        <div id="subcategorias-container" class="subcategorias-container">
            <button class="subcat-btn" data-subcat="ropa">Ropa</button>
            <button class="subcat-btn" data-subcat="zapatos">Zapatos</button>
            <button class="subcat-btn" data-subcat="electronica">Electrónica</button>
            <button class="subcat-btn amazon-only" data-subcat="perfumes" style="display:none;">Perfumes</button>
        </div>

        <div id="productos" class="productos-grid">
            <p>Cargando productos...</p>
        </div>
    </div>

    <!-- Panel de Carrito -->
    <div id="overlay" class="overlay"></div>
    <div id="carrito-panel" class="carrito-panel">
        <h2>Mi Carrito</h2>
        <div id="carrito-items" style="margin: 20px 0;"></div>
        <hr>
        <div style="margin-top: 20px;">
            <p>Total: <strong id="total-carrito">$0.00</strong></p>
            <button id="ir-pagar" class="btn-agregar" style="margin-top: 10px;">Pagar con WhatsApp</button>
            <button id="cerrar-carrito" style="margin-top: 10px; width: 100%; background: none; border: none; cursor: pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycby6Lzye_pHp4FgWkm5WRFwQwrN42Yc32KtABgiVJKL2fCXFu2QoH7yQnAiNomZURhSbnw/exec';
        let productos = [];
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        let filtroPlataforma = 'todos';

        // Cargar productos desde Google Sheets
        async function cargarProductos() {
            try {
                const res = await fetch(`${API_URL}?action=getProductos`);
                productos = await res.json();
                mostrarProductos();
            } catch (e) {
                document.getElementById('productos').innerHTML = "<p>Error al cargar productos.</p>";
            }
        }

        function mostrarProductos() {
            const contenedor = document.getElementById('productos');
            let filtrados = productos.filter(p => {
                if (filtroPlataforma !== 'todos' && p.origen !== filtroPlataforma) return false;
                return true;
            });

            if (filtrados.length === 0) {
                contenedor.innerHTML = "<p>No se encontraron productos.</p>";
                return;
            }

            contenedor.innerHTML = filtrados.map(p => `
                <div class="producto-card">
                    <img src="${p.imagen}" class="producto-imagen" onerror="this.src='https://via.placeholder.com/300'">
                    <small style="color: #F4A0B5; font-weight: bold;">${p.origen}</small>
                    <h3 style="font-size: 1rem; margin: 5px 0;">${p.nombre}</h3>
                    <p class="producto-precio">$${p.precio.toFixed(2)}</p>
                    <button class="btn-agregar" onclick="agregarAlCarrito(${p.id})">Añadir al carrito</button>
                </div>
            `).join('');
        }

        // Manejo de Filtros
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroPlataforma = btn.dataset.filtro;

                // Lógica especial para Perfumes en Amazon
                const subContainer = document.getElementById('subcategorias-container');
                const btnPerfumes = document.querySelector('.amazon-only');
                
                if (filtroPlataforma === 'todos') {
                    subContainer.classList.remove('visible');
                } else {
                    subContainer.classList.add('visible');
                    btnPerfumes.style.display = (filtroPlataforma === 'Amazon') ? 'inline-block' : 'none';
                }

                mostrarProductos();
            });
        });

        // Carrito
        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            
            if (existe) {
                existe.cantidad++;
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function actualizarCarrito() {
            localStorage.setItem('carrito', JSON.stringify(carrito));
            document.getElementById('carrito-contador').innerText = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            
            const total = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);
            document.getElementById('total-carrito').innerText = `$${total.toFixed(2)}`;

            document.getElementById('carrito-items').innerHTML = carrito.map(item => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 0.9rem;">
                    <span>${item.nombre} (x${item.cantidad})</span>
                    <span>$${(item.precio * item.cantidad).toFixed(2)}</span>
                </div>
            `).join('');
        }

        // UI de Carrito
        document.getElementById('carrito-toggle').onclick = () => {
            document.getElementById('carrito-panel').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        };
        document.getElementById('cerrar-carrito').onclick = () => {
            document.getElementById('carrito-panel').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        };

        cargarProductos();
        actualizarCarrito();
    </script>
</body>
</html>
