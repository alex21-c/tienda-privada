<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Privada</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <h1>🛒 Bienvenido a la Tienda Privada</h1>
        
        <!-- Panel de administración (solo visible para ti) -->
        <div id="admin-panel" style="display:none;" class="admin-quick-panel">
            <a href="admin.html" class="btn-admin">📊 Ir al Panel de Administrador</a>
        </div>
        
        <!-- Filtros de plataforma -->
        <div class="filtros-plataforma">
            <button class="filtro-btn active" data-filtro="todos">Todos</button>
            <button class="filtro-btn" data-filtro="Amazon">Amazon</button>
            <button class="filtro-btn" data-filtro="Temu">Temu</button>
        </div>
        
        <!-- Filtros de género (aparecen después de seleccionar plataforma) -->
        <div id="filtros-genero" style="display:none;" class="filtros-genero">
            <button class="filtro-genero-btn active" data-genero="todos">Todos</button>
            <button class="filtro-genero-btn" data-genero="hombre">👨 Hombre</button>
            <button class="filtro-genero-btn" data-genero="mujer">👩 Mujer</button>
            <button class="filtro-genero-btn" data-genero="niño">👦 Niño</button>
            <button class="filtro-genero-btn" data-genero="niña">👧 Niña</button>
        </div>
        
        <!-- Contenedor de productos -->
        <div id="productos" class="productos-grid">
            <div class="loading">Cargando productos...</div>
        </div>
        
        <!-- Carrito -->
        <div class="carrito-section">
            <h2>🛍️ Tu Carrito</h2>
            <div id="carrito-lista" class="carrito-lista">
                <p class="vacio">El carrito está vacío</p>
            </div>
            <div class="carrito-total">
                <strong>Total: $<span id="total">0.00</span></strong>
            </div>
        </div>
        
        <!-- Formulario de pedido -->
        <div id="formulario-datos" style="display:none;" class="formulario-pedido">
            <h2>📋 Completa tus datos</h2>
            <form id="pedido-form">
                <label>Nombre completo:</label>
                <input type="text" id="nombre" required>
                
                <label>Dirección de entrega:</label>
                <textarea id="direccion" required rows="3"></textarea>
                
                <label>Método de pago:</label>
                <select id="metodo-pago" required>
                    <option value="">Selecciona...</option>
                    <option value="Efectivo contra entrega">💵 Efectivo (pagas al recibir)</option>
                    <option value="Yappy">📱 Yappy (te enviamos el número)</option>
                    <option value="Transferencia">🏦 Transferencia bancaria</option>
                </select>
                
                <button type="submit" class="btn-confirmar">✅ Confirmar Pedido</button>
            </form>
        </div>
    </div>
    
    <!-- Modal de detalle de producto -->
    <div id="producto-modal" class="modal">
        <div class="modal-content">
            <span class="modal-cerrar">&times;</span>
            <div id="modal-contenido">
                <img id="modal-imagen" src="" alt="">
                <h2 id="modal-nombre"></h2>
                <p id="modal-origen"></p>
                <p id="modal-genero" style="margin:5px 0; color:#C4B7A6;"></p>
                <p id="modal-precio"></p>
                <p id="modal-descripcion"></p>
                
                <!-- Selector de colores -->
                <div id="modal-colores" style="margin:15px 0;">
                    <label style="font-weight:bold; display:block; margin-bottom:8px;">🎨 Color:</label>
                    <div id="selector-color" style="display:flex; gap:10px; flex-wrap:wrap;">
                    </div>
                </div>
                
                <!-- Selector de tallas (se actualiza según color seleccionado) -->
                <div id="modal-variantes" style="display:none; margin:15px 0;">
                    <label style="font-weight:bold;">📏 Talla / Variante:</label>
                    <select id="selector-variante" style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ccc;">
                    </select>
                </div>
                
                <!-- Enlace oculto para admin -->
                <div id="modal-enlace-admin" style="display:none; margin:15px 0; padding:12px; background:#E8E6E1; border-radius:16px;">
                    <label style="font-weight:500; color:#9CAF88; display:block; margin-bottom:8px;">🔗 Enlace original del producto:</label>
                    <a id="modal-enlace" href="#" target="_blank" style="color:#D4A5A5; text-decoration:none; word-break:break-all; font-size:0.85em;">Cargando...</a>
                    <button id="copiar-enlace" style="margin-top:8px; background:#9CAF88; color:white; border:none; padding:6px 12px; border-radius:20px; cursor:pointer; font-size:0.75em;">📋 Copiar enlace</button>
                </div>
                
                <button id="modal-agregar" class="btn-agregar">➕ Agregar al carrito</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
